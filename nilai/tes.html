<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Indeks Nilai</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            text-align: center;
            padding-top: 60px;
        }
        .box {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            display: inline-block;
            width: 300px;
        }
        input[type="number"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Menentukan Indeks Nilai</h2>
        <input type="number" id="nilai" placeholder="Masukkan nilai siswa (0-100)"><br>
        <button onclick="cekNilai()">Cek</button>
        <div class="result" id="hasil"></div>
    </div>

    <script src="tes.js">
        
    </script>
</body>
</html>
